# Monorepo: frontend only. API deploys separately (e.g. Railway).
[build]
  base = "client"
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# React Router — serve index.html for client-side routes
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
